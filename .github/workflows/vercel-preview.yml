name: Vercel preview deploy

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_9FMXoLt7MhHBUdJllzuq4bKC
  VERCEL_PROJECT_ID: prj_Xo8152D5GNJR9UwXo7mpIp0zY4hV

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Deploy to Vercel (preview)
        id: deploy
        run: |
          npm install --global vercel@latest
          DEPLOY_URL=$(vercel deploy --yes --token="$VERCEL_TOKEN")
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Preview: $DEPLOY_URL" >> "$GITHUB_STEP_SUMMARY"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- vercel-preview-comment -->';
            const url = '${{ steps.deploy.outputs.url }}';
            const body = [
              marker,
              '### Vercel preview deployed',
              '',
              `| Preview | Commit |`,
              `| --- | --- |`,
              `| ${url} | ${context.payload.pull_request.head.sha.slice(0, 7)} |`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body,
              });
            }
